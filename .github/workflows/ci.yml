on:
  pull_request:
  push:
    branches: [docker-jenkins]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy
        # Only run this step if the branch is docker-jenkins
        if: github.ref == 'refs/heads/docker-jenkins'
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl "$deploy_url"